#===================
# PROXY CONFIGURATION
# ============================================
proxy {
  # Base details
  host = "primary-proxy.intranet.grepacpint.com"
  port = 8080
  user = ${PROXY_USER}
  pass = ${PROXY_PASS_ENCODED}

  # Construct the full URL once
  url = "http://"${proxy.user}":"${proxy.pass}"@"${proxy.host}":"${proxy.port}

  # Exclusion list (No Proxy)
  no_proxy_list = "localhost,127.0.0.1,.intranet.grepacpint.com,.local"
}

# Standard Environment Variable Mapping
http_proxy = ${proxy.url}
https_proxy = ${proxy.url}
HTTP_PROXY = ${proxy.url}
HTTPS_PROXY = ${proxy.url}
no_proxy = ${proxy.no_proxy_list}
NO_PROXY = ${proxy.no_proxy_list}

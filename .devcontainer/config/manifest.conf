// Root proviso manifest for the dev container.
//
// PROVISO_REQUIRED_PROVISIONS — system requirements, runs first (config symlinks, dotfiles)
// PROVISION_LIST              — user-facing apps and tools

PROVISO_REQUIRED_PROVISIONS = [
  ".devcontainer/config/provisions/devcontainer-configs.conf"
  ".devcontainer/config/provisions/dotfiles.conf"
]

PROVISION_LIST = [
  ".devcontainer/config/provisions/modern-linux-utils.conf"
  ".devcontainer/config/provisions/ide.conf"
]

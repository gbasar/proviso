# Modern Linux Dev Container Utilities
# Schema: install{method,package}, priority(1-3), enabled, tags[], grade, help{tldr,aliases[],try[]}
# Grade: A+ = essential, A = very useful, B+ = solid, B = nice to have, C = niche

# ─── File Navigation & Listing ───────────────────────────────────────────────

# question, i love being able toi categor3ize things  but dont' want to have tow worry abouit3
# a super annoying orginzation streuctions
file-navigation {

  eza {
    replaces = "ls"
    description = "Modern ls with icons, git integration, tree view"
    install { method = cargo, package = eza }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "rust", "files"]
    grade = "A+"
    help {
      tldr = "tldr eza"
      aliases = [
        "ls = eza --icons"
        "ll = eza -l --icons --git"
        "la = eza -la --icons --git"
        "lt = eza --tree --icons --level=2"
      ]
      try = [
        "eza -la --icons --git"
        "eza --tree --level=3 --icons"
        "eza -l --sort=modified --reverse"
      ]
    }
  }

  bat {
    replaces = "cat"
    description = "Syntax highlighting, line numbers, git diff markers"
    install { method = cargo, package = bat }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "rust", "files", "syntax"]
    grade = "A+"
    help {
      tldr = "tldr bat"
      aliases = [
        "cat = bat --paging=never"
        "less = bat"
      ]
      try = [
        "bat --style=full README.md"
        "bat --diff file.py"
        "echo '{\"key\":\"val\"}' | bat -l json"
      ]
    }
  }

  zoxide {
    replaces = "cd"
    description = "Frecency-based directory jumper, learns your habits"
    install { method = cargo, package = zoxide }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "rust", "navigation"]
    grade = "A+"
    help {
      tldr = "tldr zoxide"
      aliases = [
        "cd = z"
        "cdi = zi"
      ]
      try = [
        "z myproject"
        "zi"
        "zoxide query --list"
      ]
    }
  }

  broot {
    replaces = "tree"
    description = "Interactive tree with fuzzy search and file preview"
    install { method = cargo, package = broot }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "rust", "files", "tui"]
    grade = "A"
    help {
      tldr = "tldr broot"
      aliases = [
        "tree = broot"
      ]
      try = [
        "broot -s"
        "broot -w"
        "broot --sizes --sort-by-size"
      ]
    }
  }

}

# ─── Search & Find ───────────────────────────────────────────────────────────

search {

  ripgrep {
    replaces = "grep"
    description = "Blazingly fast recursive regex search, respects .gitignore"
    install { method = cargo, package = ripgrep }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "rust", "search", "regex"]
    grade = "A+"
    help {
      tldr = "tldr rg"
      aliases = [
        "grep = rg"
      ]
      try = [
        "rg 'TODO|FIXME' --glob '*.py'"
        "rg -t rust 'unwrap'"
        "rg --stats 'import' src/"
        "rg -l 'pattern' | xargs bat"
      ]
    }
  }

  fd {
    replaces = "find"
    description = "Simple, fast file finder with sane defaults"
    install { method = cargo, package = fd-find }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "rust", "search", "files"]
    grade = "A+"
    help {
      tldr = "tldr fd"
      aliases = [
        "find = fd"
      ]
      try = [
        "fd '.py$'"
        "fd -H -t f '.conf'"
        "fd --extension json --exec bat {}"
        "fd -t d node_modules -x rm -rf {}"
      ]
    }
  }

  fzf {
    replaces = "nothing — it is new"
    description = "Fuzzy finder for anything: files, history, branches, processes"
    install { method = dnf, package = fzf }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "go", "search", "interactive"]
    grade = "A+"
    help {
      tldr = "tldr fzf"
      aliases = [
        "preview = fzf --preview 'bat --color=always {}'"
      ]
      try = [
        "fzf --preview 'bat --color=always {}'"
        "git log --oneline | fzf --preview 'git show {1}'"
        "ps aux | fzf"
        "export FZF_DEFAULT_COMMAND='fd --type f'"
      ]
    }
  }

}

# ─── Text & Data Processing ──────────────────────────────────────────────────

text-processing {

  jq {
    replaces = "awk/sed for JSON"
    description = "JSON processor, query, filter, transform"
    install { method = dnf, package = jq }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "c", "json", "data"]
    grade = "A+"
    help {
      tldr = "tldr jq"
      aliases = []
      try = [
        "echo '{\"a\":1,\"b\":2}' | jq '.a'"
        "curl -s https://api.github.com/users/octocat | jq '.login, .id'"
        "cat data.json | jq '[.[] | select(.age > 30)]'"
        "jq -r '.[] | [.name, .email] | @csv' users.json"
      ]
    }
  }

  yq {
    replaces = "nothing"
    description = "jq but for YAML, TOML, XML, CSV"
    install { method = pip, package = yq }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "python", "yaml", "data"]
    grade = "A"
    help {
      tldr = "tldr yq"
      aliases = []
      try = [
        "yq '.services' docker-compose.yml"
        "yq -r '.metadata.name' k8s.yaml"
        "cat config.yaml | yq '.database.host'"
      ]
    }
  }

  sd {
    replaces = "sed"
    description = "Intuitive find-and-replace, no regex escaping nightmares"
    install { method = cargo, package = sd }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "rust", "text", "replace"]
    grade = "A"
    help {
      tldr = "tldr sd"
      aliases = [
        "sed = sd"
      ]
      try = [
        "echo 'hello world' | sd 'world' 'rust'"
        "sd 'foo' 'bar' src/**/*.py"
        "sd 'http://' 'https://' $(fd -t f '.html')"
      ]
    }
  }

  delta {
    replaces = "diff"
    description = "Syntax-highlighted diffs with line numbers, git integration"
    install { method = cargo, package = git-delta }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "rust", "git", "diff"]
    grade = "A+"
    note = "Also listed under git-tools — set as core.pager in gitconfig"
    help {
      tldr = "tldr delta"
      aliases = [
        "diff = delta"
      ]
      try = [
        "diff old.py new.py | delta"
        "git diff | delta --side-by-side"
        "delta --show-syntax-themes"
        "git config --global core.pager delta"
      ]
    }
  }

}

# ─── System Monitoring ────────────────────────────────────────────────────────

monitoring {

  btop {
    replaces = "top/htop"
    description = "Beautiful resource monitor with mouse support, themes"
    install { method = dnf, package = btop }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "cpp", "monitoring", "tui"]
    grade = "A+"
    help {
      tldr = "tldr btop"
      aliases = [
        "top = btop"
        "htop = btop"
      ]
      try = [
        "btop"
        "btop --utf-force"
        "btop -t"
      ]
    }
  }

  procs {
    replaces = "ps"
    description = "Modern process viewer with color, tree, and search"
    install { method = cargo, package = procs }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "rust", "monitoring", "process"]
    grade = "A"
    help {
      tldr = "tldr procs"
      aliases = [
        "ps = procs"
      ]
      try = [
        "procs"
        "procs --tree"
        "procs --sortd cpu"
        "procs --watch"
      ]
    }
  }

  duf {
    replaces = "df"
    description = "Disk usage with color-coded grouped output, JSON support"
    install { method = go, package = "github.com/muesli/duf" }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "go", "monitoring", "disk"]
    grade = "A"
    help {
      tldr = "tldr duf"
      aliases = [
        "df = duf"
      ]
      try = [
        "duf"
        "duf --json"
        "duf --only local"
      ]
    }
  }

  dust {
    replaces = "du"
    description = "Intuitive disk usage with visual bar chart"
    install { method = cargo, package = du-dust }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "rust", "monitoring", "disk"]
    grade = "A"
    help {
      tldr = "tldr dust"
      aliases = [
        "du = dust"
      ]
      try = [
        "dust"
        "dust -r"
        "dust -d 3 /var"
        "dust -n 20"
      ]
    }
  }

  bandwhich {
    replaces = "nethogs"
    description = "Per-process bandwidth monitoring in real time (requires sudo)"
    install { method = cargo, package = bandwhich }
    priority = 1
    enabled = true
    tags = ["cli", "modern", "rust", "monitoring", "network"]
    grade = "B"
    help {
      tldr = "tldr bandwhich"
      aliases = []
      try = [
        "sudo bandwhich"
        "sudo bandwhich --raw"
      ]
    }
  }

}

# ─── Git & Version Control ────────────────────────────────────────────────────

git-tools {

  lazygit {
    replaces = "git cli workflows"
    description = "Terminal UI for git with staging, branching, rebasing"
    install { method = go, package = "github.com/jesseduffield/lazygit" }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "go", "git", "tui"]
    grade = "A+"
    help {
      tldr = "tldr lazygit"
      aliases = [
        "lg = lazygit"
      ]
      try = [
        "lazygit"
        "lazygit --filter-path src/"
        "lazygit log"
      ]
    }
  }

  gitui {
    replaces = "git cli workflows"
    description = "Blazing fast git TUI written in Rust"
    install { method = cargo, package = gitui }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "rust", "git", "tui"]
    grade = "A"
    help {
      tldr = "tldr gitui"
      aliases = [
        "gu = gitui"
      ]
      try = [
        "gitui"
        "gitui -d /path/to/repo"
      ]
    }
  }

  # delta lives in text-processing — reference only
  delta { see = "text-processing.delta" }

}

# ─── Networking & HTTP ────────────────────────────────────────────────────────

networking {

  httpie {
    replaces = "curl (for API work)"
    description = "Human-friendly HTTP client with colors, JSON by default"
    install { method = pip, package = httpie }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "python", "http", "api"]
    grade = "A"
    help {
      tldr = "tldr http"
      aliases = []
      try = [
        "http httpbin.org/get"
        "http POST httpbin.org/post name=claude role=assistant"
        "http -v https://api.github.com/users/octocat"
      ]
    }
  }

  dog {
    replaces = "dig"
    description = "DNS lookup with color output and JSON support"
    install { method = cargo, package = dog }
    priority = 1
    enabled = true
    tags = ["cli", "modern", "rust", "dns", "network"]
    grade = "B"
    help {
      tldr = "tldr dog"
      aliases = [
        "dig = dog"
      ]
      try = [
        "dog example.com"
        "dog example.com MX"
        "dog example.com --json"
      ]
    }
  }

  xh {
    replaces = "curl"
    description = "Fast HTTP client, httpie-compatible syntax, written in Rust"
    install { method = cargo, package = xh }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "rust", "http", "api"]
    grade = "A"
    help {
      tldr = "tldr xh"
      aliases = [
        "curl = xh"
      ]
      try = [
        "xh httpbin.org/get"
        "xh POST httpbin.org/post name=test"
        "xh -v --follow https://short.url/abc"
      ]
    }
  }

}

# ─── Shell & Terminal ─────────────────────────────────────────────────────────

shell {

  starship {
    replaces = "custom PS1 / oh-my-zsh themes"
    description = "Cross-shell prompt with git, language, container context"
    install { method = cargo, package = starship }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "rust", "shell", "prompt"]
    grade = "A+"
    help {
      tldr = "tldr starship"
      aliases = []
      try = [
        "starship init bash"
        "starship preset nerd-font-symbols -o ~/.config/starship.toml"
        "starship explain"
        "starship timings"
      ]
    }
  }

  tmux {
    replaces = "nothing — foundational"
    description = "Terminal multiplexer, sessions, panes, survives disconnects"
    install { method = dnf, package = tmux }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "c", "shell", "multiplexer"]
    grade = "A+"
    help {
      tldr = "tldr tmux"
      aliases = [
        "ta = tmux attach -t"
        "tn = tmux new -s"
        "tl = tmux list-sessions"
      ]
      try = [
        "tmux new -s dev"
        "tmux split-window -h"
        "tmux list-sessions"
        "tmux attach -t dev"
      ]
    }
  }

  zellij {
    replaces = "tmux"
    description = "Modern terminal multiplexer with discoverable keybinds"
    install { method = cargo, package = zellij }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "rust", "shell", "multiplexer"]
    grade = "A"
    help {
      tldr = "tldr zellij"
      aliases = [
        "zj = zellij"
      ]
      try = [
        "zellij"
        "zellij --layout compact"
        "zellij setup --dump-layout default"
      ]
    }
  }

  atuin {
    replaces = "ctrl-r shell history"
    description = "Magical shell history with sync, search, stats"
    install { method = cargo, package = atuin }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "rust", "shell", "history"]
    grade = "A+"
    help {
      tldr = "tldr atuin"
      aliases = []
      try = [
        "atuin search 'docker'"
        "atuin stats"
        "atuin history list --cmd-only"
        "eval \"$(atuin init bash)\""
      ]
    }
  }

  tealdeer {
    replaces = "man (for quick reference)"
    description = "Fast tldr client — practical examples instead of man walls"
    install { method = cargo, package = tealdeer }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "rust", "shell", "help"]
    grade = "A"
    help {
      tldr = "tldr tldr"
      aliases = [
        "help = tldr"
      ]
      try = [
        "tldr tar"
        "tldr --update"
        "tldr --list | fzf --preview 'tldr {}'"
      ]
    }
  }

}

# ─── File Transfer & Sync ────────────────────────────────────────────────────

file-transfer {

  rclone {
    replaces = "scp for cloud"
    description = "Sync to 70+ cloud providers, mount as filesystem"
    install { method = dnf, package = rclone }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "go", "cloud", "sync"]
    grade = "A"
    help {
      tldr = "tldr rclone"
      aliases = []
      try = [
        "rclone config"
        "rclone ls remote:bucket"
        "rclone sync ./local remote:bucket --progress"
        "rclone mount remote:bucket /mnt/cloud --daemon"
      ]
    }
  }

  aria2 {
    replaces = "wget"
    description = "Multi-protocol download with resume, parallel connections"
    install { method = dnf, package = aria2 }
    priority = 1
    enabled = true
    tags = ["cli", "modern", "cpp", "download"]
    grade = "B"
    help {
      tldr = "tldr aria2c"
      aliases = [
        "wget = aria2c"
      ]
      try = [
        "aria2c https://example.com/file.tar.gz"
        "aria2c -x 16 https://example.com/large.iso"
        "aria2c -i urls.txt"
      ]
    }
  }

}

# ─── Build & Dev Productivity ─────────────────────────────────────────────────

dev-productivity {

  tokei {
    replaces = "cloc"
    description = "Fast code stats — lines, blanks, comments per language"
    install { method = cargo, package = tokei }
    priority = 2
    enabled = true
    tags = ["cli", "modern", "rust", "dev", "stats"]
    grade = "A"
    help {
      tldr = "tldr tokei"
      aliases = []
      try = [
        "tokei"
        "tokei --sort lines"
        "tokei --exclude '*.min.js'"
        "tokei --files"
      ]
    }
  }

  hyperfine {
    replaces = "time"
    description = "Benchmarking with warmup runs, statistical analysis, export"
    install { method = cargo, package = hyperfine }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "rust", "dev", "benchmark"]
    grade = "A+"
    help {
      tldr = "tldr hyperfine"
      aliases = []
      try = [
        "hyperfine 'fd .py'"
        "hyperfine --warmup 3 'rg TODO' 'grep -r TODO'"
        "hyperfine --export-markdown bench.md 'cargo build'"
      ]
    }
  }

  just {
    replaces = "make (for task running)"
    description = "Modern command runner, simpler syntax than make"
    install { method = cargo, package = just }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "rust", "dev", "taskrunner"]
    grade = "A+"
    help {
      tldr = "tldr just"
      aliases = [
        "j = just"
      ]
      try = [
        "just --list"
        "just build"
        "just --evaluate"
        "just --fmt --unstable"
      ]
    }
  }

  direnv {
    replaces = "manual env setup"
    description = "Auto-load .envrc per directory, unloads on exit"
    install { method = dnf, package = direnv }
    priority = 3
    enabled = true
    tags = ["cli", "modern", "go", "dev", "env"]
    grade = "A+"
    help {
      tldr = "tldr direnv"
      aliases = []
      try = [
        "echo 'export API_KEY=secret' > .envrc && direnv allow"
        "direnv status"
        "eval \"$(direnv hook bash)\""
      ]
    }
  }

}

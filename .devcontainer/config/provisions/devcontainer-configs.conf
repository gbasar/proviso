// Dev container own config files — symlinked from the repo into $HOME.
// These are the defaults that live in version control, not personal dotfiles.
// src must be the container-internal path (/workspace is bind-mounted by devcontainer.json).

provisions {

  starship {
    provision_type = file
    src         = "/workspace/.devcontainer/config/starship.toml"
    destination = "~/.config/starship.toml"
    mode        = SYMLINK
  }

  fish-config {
    provision_type = file
    src         = "/workspace/.devcontainer/config/fish/config.fish"
    destination = "~/.config/fish/config.fish"
    mode        = SYMLINK
  }

  nushell-config {
    provision_type = file
    src         = "/workspace/.devcontainer/config/nushell/config.nu"
    destination = "~/.config/nushell/config.nu"
    mode        = SYMLINK
  }

  nushell-env {
    provision_type = file
    src         = "/workspace/.devcontainer/config/nushell/env.nu"
    destination = "~/.config/nushell/env.nu"
    mode        = SYMLINK
  }

  nvim-config {
    provision_type = file
    src         = "/workspace/.devcontainer/config/nvim/init.lua"
    destination = "~/.config/nvim/init.lua"
    mode        = SYMLINK
  }

  vimrc {
    provision_type = file
    src         = "/workspace/.devcontainer/config/vim/.vimrc"
    destination = "~/.vimrc"
    mode        = SYMLINK
  }

}

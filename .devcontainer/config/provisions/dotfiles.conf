// Personal dotfiles — BOUND then SYMLINK with override.
//
// Order relative to devcontainer-configs.conf:
//   devcontainer-configs entries run first (sort key 1 — default).
//   These entries run second (sort key 2 — override = true).
//   So devcontainer defaults always land first; personal dotfiles win
//   only when /proviso/dotfiles is mounted and the src exists.
//
// If ~/.proviso/dotfiles is not mounted:
//   dot_files_folder BOUND → SKIPPED (source absent)
//   dot-* SYMLINK entries  → SKIPPED (_symlink checks src.exists())
//   devcontainer defaults remain in place.
//
// Host layout assumed:  ~/.proviso/dotfiles/
//                           .config/starship.toml
//                           .config/fish/config.fish
//                           .config/nushell/config.nu
//                           .config/nushell/env.nu
//                           .config/nvim/init.lua
//                           .vimrc

provisions {

  // ── Step 1: declare the host bind-mount ────────────────────────────────────
  // `parcel gen-devcontainer` reads this and patches devcontainer.json mounts.
  // At runtime /proviso/dotfiles is already mounted — this entry is a no-op
  // if the directory exists, or silently skipped if the host path is absent.
  dot_files_folder {
    provision_type = file
    src         = "~/.proviso/dotfiles"    // default
    src         = ${?PROVISO_DOTFILES_DIR}  // override: export PROVISO_DOTFILES_DIR=/path/to/dotfiles
    destination = "/proviso/dotfiles"
    mode        = BOUND
  }

  // ── Step 2: symlink each config to where the app expects it ────────────────
  // Names are unique (dot- prefix) so they don't overwrite devcontainer-configs
  // entries in the registry. override = true ensures they run after devcontainer
  // defaults and replace the symlinks when /proviso/dotfiles is available.

  dot-starship {
    provision_type = file
    src         = "/proviso/dotfiles/.config/starship.toml"
    destination = "~/.config/starship.toml"
    mode        = SYMLINK
    override    = true
  }

  dot-fish-config {
    provision_type = file
    src         = "/proviso/dotfiles/.config/fish/config.fish"
    destination = "~/.config/fish/config.fish"
    mode        = SYMLINK
    override    = true
  }

  dot-nushell-config {
    provision_type = file
    src         = "/proviso/dotfiles/.config/nushell/config.nu"
    destination = "~/.config/nushell/config.nu"
    mode        = SYMLINK
    override    = true
  }

  dot-nushell-env {
    provision_type = file
    src         = "/proviso/dotfiles/.config/nushell/env.nu"
    destination = "~/.config/nushell/env.nu"
    mode        = SYMLINK
    override    = true
  }

  dot-nvim-config {
    provision_type = file
    src         = "/proviso/dotfiles/.config/nvim/init.lua"
    destination = "~/.config/nvim/init.lua"
    mode        = SYMLINK
    override    = true
  }

  dot-vimrc {
    provision_type = file
    src         = "/proviso/dotfiles/.vimrc"
    destination = "~/.vimrc"
    mode        = SYMLINK
    override    = true
  }

}

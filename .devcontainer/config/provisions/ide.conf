# IDE and editor tooling — display libs, editors, IDE launchers

display {
  libX11         { install { method = dnf, package = libX11 } }
  libXext        { install { method = dnf, package = libXext } }
  libXrender     { install { method = dnf, package = libXrender } }
  libXtst        { install { method = dnf, package = libXtst } }
  libXi          { install { method = dnf, package = libXi } }
  libXrandr      { install { method = dnf, package = libXrandr } }
  libXfixes      { install { method = dnf, package = libXfixes } }
  wayland        { install { method = dnf, package = libwayland-client } }
  wayland-cursor { install { method = dnf, package = libwayland-cursor } }
  wayland-egl    { install { method = dnf, package = libwayland-egl } }
  mesa-gl        { install { method = dnf, package = mesa-libGL } }
  mesa-egl       { install { method = dnf, package = mesa-libEGL } }
  fontconfig     { install { method = dnf, package = fontconfig } }
  fontconfig-dev { install { method = dnf, package = fontconfig-devel } }
  freetype       { install { method = dnf, package = freetype } }
  freetype-dev   { install { method = dnf, package = freetype-devel } }
  // dbus-x11 not available in UBI9 repos
  // xeyes: xorg-x11-apps not in UBI9 — removed (display test, WSLg handles it)
  // gtk3-demo: gtk3-devel not in UBI9 — removed (display test only)
}

editors {
  neovim  { install { method = dnf, package = neovim } }
  neovide { install { method = cargo, package = neovide } }
  helix {
    install      { method = cargo, package = helix-term }
    post_install = "hx --grammar fetch && hx --grammar build"
  }
}

shells {
  // fish: default shell in the devcontainer (see Dockerfile.devcontainer --shell /usr/bin/fish)
  fish {
    install      { method = dnf, package = fish }
    post_install = "echo /usr/bin/fish >> /etc/shells"
  }
}

// JetBrains IDEs removed — they run on the host (WSL2 baremetal), not in the container.
// Install IntelliJ and PyCharm directly from tar.gz on WSL2 via the WSL2 proviso manifest.
// No Toolbox — it's a background agent / telemetry machine.

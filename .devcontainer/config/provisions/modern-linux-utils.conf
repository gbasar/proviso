# Modern Linux Dev Container Utilities

file-navigation {
  eza     { install { method = cargo, package = eza } }
  bat     { install { method = cargo, package = bat } }
  zoxide  { install { method = cargo, package = zoxide } }
  broot   { install { method = cargo, package = broot } }
  tree    { install { method = dnf,   package = tree } }
}

search {
  ripgrep { install { method = cargo, package = ripgrep } }
  fd      { install { method = cargo, package = fd-find } }
  fzf     { install { method = dnf,   package = fzf } }
}

text-processing {
  jq    { install { method = dnf,   package = jq } }
  yq    { install { method = pip,   package = yq } }
  sd    { install { method = cargo, package = sd } }
  delta { install { method = cargo, package = git-delta } }
}

monitoring {
  btop      { install { method = dnf,   package = btop } }
  procs     { install { method = cargo, package = procs } }
  duf       { install { method = go,    package = "github.com/muesli/duf" } }
  dust      { install { method = cargo, package = du-dust } }
  bandwhich { install { method = cargo, package = bandwhich } }
}

git-tools {
  lazygit { install { method = go,    package = "github.com/jesseduffield/lazygit" } }
  gitui   { install { method = cargo, package = gitui } }
}

networking {
  httpie { install { method = pip,   package = httpie } }
  xh     { install { method = cargo, package = xh } }
}

shell {
  nu {
    install      { method = cargo, package = nu }
    post_install = "echo /usr/local/bin/nu >> /etc/shells"
  }
  starship { install { method = cargo, package = starship } }
  zellij   { install { method = cargo, package = zellij } }
  atuin    { install { method = cargo, package = atuin } }
  tealdeer { install { method = cargo, package = tealdeer } }
}

file-transfer {
  rclone { install { method = dnf, package = rclone } }
}

dev-productivity {
  tokei     { install { method = cargo, package = tokei } }
  hyperfine { install { method = cargo, package = hyperfine } }
  just      { install { method = cargo, package = just } }
  direnv    { install { method = go,    package = "github.com/direnv/direnv" } }
}

# ══════════════════════════════════════════════════════════════════════════════
# Starship — general purpose prompt, works in bash / zsh / fish / nushell
# ══════════════════════════════════════════════════════════════════════════════
"$schema" = 'https://starship.rs/config-schema.json'

# Two-line prompt: info on line 1, ❯ on line 2
format = """
[╭](bold green)$directory$git_branch$git_status$python$rust$golang$nodejs$container$jobs
[╰❯](bold green) """

add_newline = true

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
conflicted  = "⚡"
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"
untracked   = "?"
stashed     = "$"
modified    = "!"
staged      = "+"
renamed     = "»"
deleted     = "✘"

[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
detect_files = ["pyproject.toml", "requirements.txt", ".python-version"]

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
detect_files = ["package.json"]

[rust]
symbol = " "
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"

[container]
format = "[$symbol \\[$name\\]]($style) "
style = "bold red"

[jobs]
symbol = "⚙"
style = "bold blue"
number_threshold = 1
format = "[$symbol$number]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"
